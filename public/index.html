<!DOCTYPE html>
<html>
<body>
    <h1>Test Socket</h1>
    <div id="log"></div>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const socket = io('https://unbanserverlive1.onrender.com');
        document.getElementById('log').innerHTML = 'Connecting...';
        
        socket.on('connect', () => {
            document.getElementById('log').innerHTML = '✅ Connected!';
        });
        
        socket.on('connect_error', (err) => {
            document.getElementById('log').innerHTML = '❌ Error: ' + err.message;
        });
    </script>
</body>
</html>
